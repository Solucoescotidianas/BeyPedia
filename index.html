<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beypedia — Intro Animado</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0D0D0D;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: Georgia, serif;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  .scene {
    position: relative;
    width: 400px;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ROTATING OUTER HEX */
  .hex-outer {
    position: absolute;
    width: 300px;
    height: 300px;
    animation: hexRotate 12s linear infinite;
    opacity: 0;
    animation-fill-mode: forwards;
    animation-delay: 0.3s;
  }

  @keyframes hexRotate {
    0%   { transform: rotate(0deg);   opacity: 0; }
    8%   { opacity: 0.5; }
    100% { transform: rotate(360deg); opacity: 0.5; }
  }

  /* INNER HEX PULSE */
  .hex-inner {
    position: absolute;
    width: 240px;
    height: 240px;
    animation: hexPulse 3s ease-in-out infinite, hexFadeIn 0.8s ease 0.6s both;
  }

  @keyframes hexFadeIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes hexPulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.03); }
  }

  /* BEE SVG */
  .bee-wrap {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: beeReveal 1s cubic-bezier(0.16,1,0.3,1) 0.9s both;
  }

  @keyframes beeReveal {
    from { opacity: 0; transform: translateY(14px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* CROWN ANIMATION */
  .crown-group {
    animation: crownDrop 0.6s cubic-bezier(0.34,1.56,0.64,1) 1.4s both;
  }

  @keyframes crownDrop {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* WINGS FLUTTER */
  .wing-left {
    transform-origin: right center;
    animation: wingLeft 2.2s ease-in-out 1.8s infinite;
  }
  .wing-right {
    transform-origin: left center;
    animation: wingRight 2.2s ease-in-out 1.8s infinite;
  }

  @keyframes wingLeft {
    0%, 100% { transform: scaleX(1); opacity: 0.55; }
    50%       { transform: scaleX(0.88); opacity: 0.75; }
  }

  @keyframes wingRight {
    0%, 100% { transform: scaleX(1); opacity: 0.55; }
    50%       { transform: scaleX(0.88); opacity: 0.75; }
  }

  /* TEXT REVEAL */
  .text-beypedia {
    animation: textReveal 0.8s ease 1.6s both;
    transform-origin: center;
  }

  .text-sub {
    animation: textReveal 0.8s ease 1.9s both;
  }

  @keyframes textReveal {
    from { opacity: 0; letter-spacing: 12px; }
    to   { opacity: 1; }
  }

  /* GOLD PARTICLE DOTS */
  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #C9A84C;
    animation: particleFly var(--dur) ease var(--delay) infinite;
  }

  @keyframes particleFly {
    0%   { transform: translate(0,0) scale(1); opacity: 0; }
    20%  { opacity: 0.8; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* LINE SWEEP — horizontal */
  .line-sweep {
    position: absolute;
    width: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, #C9A84C, transparent);
    top: 50%;
    left: 50%;
    transform: translateX(-50%);
    animation: lineSweep 1s ease 0.2s both;
  }

  @keyframes lineSweep {
    from { width: 0; opacity: 0.8; }
    to   { width: 320px; opacity: 0; }
  }

  /* STINGER STING */
  .stinger {
    animation: stingerPulse 2.2s ease-in-out 2s infinite;
  }

  @keyframes stingerPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }

  /* REPLAY BUTTON */
  .replay-btn {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: 0.5px solid rgba(201,168,76,0.35);
    color: #C9A84C;
    padding: 0.55rem 1.6rem;
    font-family: Georgia, serif;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    z-index: 100;
    opacity: 0;
    animation: fadeInBtn 0.5s ease 2.5s both;
  }

  @keyframes fadeInBtn {
    to { opacity: 1; }
  }

  .replay-btn:hover {
    background: rgba(201,168,76,0.08);
    border-color: #C9A84C;
  }

  /* SPEED CONTROLS */
  .controls {
    position: fixed;
    bottom: 5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.6rem;
    z-index: 100;
    opacity: 0;
    animation: fadeInBtn 0.5s ease 2.7s both;
  }

  .ctrl-btn {
    background: none;
    border: 0.5px solid rgba(201,168,76,0.2);
    color: #8C7235;
    padding: 0.3rem 0.8rem;
    font-family: Georgia, serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.3s;
  }

  .ctrl-btn:hover, .ctrl-btn.active {
    border-color: #C9A84C;
    color: #C9A84C;
  }

  /* BORDEAUX FLASH VERSION */
  .bg-flash {
    position: fixed;
    inset: 0;
    background: #6B2737;
    z-index: -1;
    opacity: 0;
    animation: bgFlash 0.4s ease 0.15s both;
  }

  @keyframes bgFlash {
    0%   { opacity: 0.6; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<div class="bg-flash"></div>

<div class="scene">

  <!-- Line sweep effect -->
  <div class="line-sweep"></div>

  <!-- Particles -->
  <div class="particle" style="--tx:-90px;--ty:-70px;--dur:3.2s;--delay:1.8s;top:55%;left:50%;"></div>
  <div class="particle" style="--tx:85px;--ty:-80px;--dur:2.8s;--delay:2.1s;top:55%;left:50%;"></div>
  <div class="particle" style="--tx:-70px;--ty:60px;--dur:3.5s;--delay:2.4s;top:45%;left:50%;"></div>
  <div class="particle" style="--tx:95px;--ty:75px;--dur:3.0s;--delay:2.0s;top:45%;left:50%;"></div>
  <div class="particle" style="--tx:-110px;--ty:10px;--dur:2.6s;--delay:2.6s;top:50%;left:50%;"></div>
  <div class="particle" style="--tx:105px;--ty:-15px;--dur:3.3s;--delay:2.2s;top:50%;left:50%;"></div>
  <div class="particle" style="--tx:20px;--ty:-95px;--dur:2.9s;--delay:2.8s;top:55%;left:48%;"></div>
  <div class="particle" style="--tx:-30px;--ty:90px;--dur:3.1s;--delay:2.3s;top:45%;left:52%;"></div>

  <!-- Rotating outer hex -->
  <svg class="hex-outer" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
    <polygon points="150,6 286,78 286,222 150,294 14,222 14,78"
      fill="none" stroke="#C9A84C" stroke-width="0.8"
      stroke-dasharray="8 4" opacity="0.6"/>
  </svg>

  <!-- Inner hex -->
  <svg class="hex-inner" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
    <polygon points="120,5 225,62.5 225,177.5 120,235 15,177.5 15,62.5"
      fill="#C9A84C" opacity="0.04"/>
    <polygon points="120,5 225,62.5 225,177.5 120,235 15,177.5 15,62.5"
      fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.25"/>
  </svg>

  <!-- BEE + TEXT -->
  <div class="bee-wrap">
    <svg viewBox="0 0 200 210" width="190" xmlns="http://www.w3.org/2000/svg">

      <!-- CROWN -->
      <g class="crown-group">
        <polygon points="100,36 92,25 86,36" fill="#E8C96A"/>
        <polygon points="100,36 100,24 97,36" fill="#C9A84C"/>
        <polygon points="100,36 108,25 114,36" fill="#E8C96A"/>
        <rect x="85" y="35" width="30" height="5" rx="1" fill="#C9A84C"/>
      </g>

      <!-- HEAD -->
      <circle cx="100" cy="56" r="14" fill="#C9A84C"/>

      <!-- ANTENNAE -->
      <line x1="93" y1="44" x2="80" y2="26" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="107" y1="44" x2="120" y2="26" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="79" cy="25" r="2.8" fill="#E8C96A"/>
      <circle cx="121" cy="25" r="2.8" fill="#E8C96A"/>

      <!-- WINGS -->
      <path class="wing-left" d="M78,72 Q44,42 34,58 Q40,78 78,82 Z" fill="#E8C96A" opacity="0.55"/>
      <path class="wing-left" d="M78,80 Q32,76 30,96 Q42,108 78,96 Z" fill="#C9A84C" opacity="0.4"/>
      <path class="wing-right" d="M122,72 Q156,42 166,58 Q160,78 122,82 Z" fill="#E8C96A" opacity="0.55"/>
      <path class="wing-right" d="M122,80 Q168,76 170,96 Q158,108 122,96 Z" fill="#C9A84C" opacity="0.4"/>

      <!-- BODY -->
      <ellipse cx="100" cy="92" rx="22" ry="30" fill="#C9A84C"/>
      <rect x="78" y="82" width="44" height="7" fill="#0D0D0D" opacity="0.55" rx="1"/>
      <rect x="78" y="96" width="44" height="7" fill="#0D0D0D" opacity="0.55" rx="1"/>

      <!-- STINGER -->
      <polygon class="stinger" points="100,122 93,138 107,138" fill="#8C7235"/>

      <!-- TEXT -->
      <text class="text-beypedia" x="100" y="162" text-anchor="middle"
        fill="#C9A84C" font-size="11.5" letter-spacing="5.5"
        font-family="Georgia, serif" font-weight="bold">BEYPEDIA</text>

      <line x1="55" y1="169" x2="145" y2="169" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/>

      <text class="text-sub" x="100" y="180" text-anchor="middle"
        fill="#8C7235" font-size="7" letter-spacing="3.5"
        font-family="Georgia, serif">ACERVO DIGITAL</text>

    </svg>
  </div>

</div>

<!-- Controls -->
<div class="controls">
  <button class="ctrl-btn active" onclick="setSpeed(1)">1×</button>
  <button class="ctrl-btn" onclick="setSpeed(1.5)">1.5×</button>
  <button class="ctrl-btn" onclick="setSpeed(2)">2×</button>
</div>

<button class="replay-btn" onclick="replay()">↺ Replay</button>

<script>
  function replay() {
    document.body.style.animation = 'none';
    const all = document.querySelectorAll('[style*="animation"], .hex-outer, .hex-inner, .bee-wrap, .crown-group, .wing-left, .wing-right, .text-beypedia, .text-sub, .stinger, .line-sweep, .bg-flash, .particle, .replay-btn, .controls, .ctrl-btn');
    all.forEach(el => {
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';
    });
  }

  function setSpeed(s) {
    document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.documentElement.style.setProperty('--speed', s);
    document.querySelectorAll('.hex-outer, .hex-inner, .bee-wrap, .crown-group, .wing-left, .wing-right, .text-beypedia, .text-sub, .stinger, .line-sweep, .bg-flash').forEach(el => {
      el.style.animationDuration = '';
      const computed = getComputedStyle(el).animationDuration;
      const dur = parseFloat(computed);
      if(!isNaN(dur)) el.style.animationDuration = (dur / s) + 's';
    });
  }
</script>
</body>
</html>
